spring.application.name=gymgod

spring.threads.virtual.enabled=true
server.port=8080

# Nutrition Database configuration (Primary)
spring.datasource.nutrition.jdbc-url=jdbc:postgresql://localhost:5432/gymgod_nutrition
spring.datasource.nutrition.username=root
spring.datasource.nutrition.password=root
spring.datasource.nutrition.driver-class-name=org.postgresql.Driver

# User Database configuration
spring.datasource.user.jdbc-url=jdbc:postgresql://localhost:5433/gymgod_user
spring.datasource.user.username=root
spring.datasource.user.password=root
spring.datasource.user.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.show-sql=false
# Batching des chargements lazy résiduels : remplace N requêtes SELECT par id
# par un seul SELECT ... WHERE id IN (...) — filet de sécurité N+1.
spring.jpa.properties.hibernate.default_batch_fetch_size=50

path.image=images
path.etl.url=https://static.openfoodfacts.org/data/en.openfoodfacts.org.products.csv
path.etl.file=data/epure.csv

# AI Configuration (Ollama / DeepSeek)
ai.enabled=true
ai.url=http://localhost:11434/api/generate
ai.model=gemma2:27b
ai.timeout=180

# Mail Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=stephan.parichon.pro@gmail.com
spring.mail.password=zzauitdkyybanwjl
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Session Configuration
# Sessions stockées dans Redis (voir SessionConfig/@EnableRedisHttpSession) — leur TTL
# est rafraîchie à chaque requête authentifiée (sliding expiration), donc un utilisateur
# actif reste connecté indéfiniment, comme sur Instagram/la plupart des apps mobiles.
# Si l'app n'est pas ouverte pendant 30 jours, la session expire et l'utilisateur doit
# se reconnecter (cf. SessionExpiredInterceptor côté Flutter).
server.servlet.session.timeout=30d
# Doit correspondre au timeout ci-dessus : sinon le PersistCookieJar Flutter supprime
# le cookie SESSION côté client avant l'expiration côté serveur.
server.servlet.session.cookie.max-age=2592000
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false
#server.servlet.session.cookie.secure=true # pour de la production (HTTPS obligatoire)

etl.image.download.enabled=true
# Quota total de stockage d'images en Mo. 0 = illimité (production).
# Voir application-dev.properties pour la limite en dev.
etl.image.download.max-total-mb=0

# Enrichissement à la demande des produits avec macros/minéraux/vitamines
# manquants (Product.nutritionDataIncomplete) via l'API produit OpenFoodFacts.
off.nutrition.enabled=true
off.nutrition.api-url=https://world.openfoodfacts.org/api/v2/product
off.nutrition.user-agent=GymGod-App - https://github.com/Xafree/App-mobile-recipe-book-back
# Délai minimum (ms) entre deux appels OFF, toutes requêtes confondues —
# évite de re-déclencher la protection anti-bot d'OpenFoodFacts.
off.nutrition.min-interval-ms=1100
off.nutrition.timeout-ms=5000

# Logging
logging.level.fr.gymgod.etl.llm=DEBUG

